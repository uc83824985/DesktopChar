<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*" />
    <title>DesktopChar Runtime Preview</title>
    <script src="./vendor/live2d/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <main>
      <canvas id="avatar" aria-label="Live2D avatar preview"></canvas>
      <section class="panel">
        <div>
          <p class="eyebrow">AVATAR RUNTIME / REAL MODEL SMOKE TEST</p>
          <h1>DesktopChar</h1>
          <p id="status">正在加载官方 Mao 测试模型…</p>
        </div>
        <div class="actions">
          <button id="speak" disabled>模拟说话</button>
          <button id="tone" disabled>口型同步验收</button>
          <button id="motion" disabled>播放动作</button>
          <button id="gaze" disabled aria-pressed="false">眼部跟随：关</button>
          <button id="reset" disabled>恢复中立</button>
        </div>
        <section id="tone-debug" class="tone-debug" aria-label="口型同步实时响应" hidden>
          <p class="tone-debug-title">KNOWN-TONE SYNC TRACE</p>
          <dl>
            <div><dt>播放端</dt><dd id="tone-playback-point">等待验收</dd></div>
            <div><dt>口型参数</dt><dd id="tone-model-point">等待验收</dd></div>
            <div><dt>下一屏幕帧</dt><dd id="tone-frame-point">等待验收</dd></div>
          </dl>
          <ol id="tone-sync-log" class="tone-sync-log"></ol>
        </section>
        <p class="hint">眼部跟随默认开启；关闭前会跨说话与动作持续生效。测试模型与 Cubism Core © Live2D Inc.，启动即表示同意仓库内所附许可。</p>
      </section>
    </main>
    <script type="module" src="/src/renderer/main.ts"></script>
  </body>
</html>
